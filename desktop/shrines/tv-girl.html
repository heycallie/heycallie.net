<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/light-mode.css" />
    <title>TV Girl</title>
    <style>
      html {
        text-align: center;
        background-color: black;
        color: white;
        cursor: url("/assets/cursors/w98normal.cur"), auto;
      }

      button {
        background-color: black;
        color: white;
      }

      .book-container {
        cursor: url("/assets/cursors/w98hand.cur"), pointer !important;
        margin-top: 10vh;
      }

      #book_open {
        display: none;
      }

      #book_closed {
        display: block;
      }

      .book-container:hover #book_closed {
        display: none;
      }

      .book-container:hover #book_open {
        display: block;
      }
    </style>

    <script>
      function changeiFrameTitleTVGirlLore() {
        window.parent.document.getElementById("shrinesiFrameTitle").innerHTML =
          "TV Girl Lore - Microsoft Internet Explorer";
      }

      function changeiFrameTitleBackButton() {
        window.parent.document.getElementById("shrinesiFrameTitle").innerHTML =
          "Shrines - Microsoft Internet Explorer";
        window.location = "/desktop/shrines";
      }
    </script>
  </head>
