<!doctype html>
<html>
  <head>
    <script>
      function showContextMenu(e) {
        e.preventDefault();
        const menu = document.getElementById("contextMenu");
        menu.style.animation = "";
        menu.classList.remove("hidden");
        menu.style.position = "absolute";
        menu.style.left = `${e.pageX}px`;
        menu.style.top = `${e.pageY}px`;
      }

      function hideContextMenu() {
        document.getElementById("contextMenu").style.animation =
          "fadeOut 0.25s linear 1";

        setTimeout(function () {
          document.getElementById("contextMenu").classList.add("hidden");
        }, 250);
      }

      function handleContextMenu(e) {
        showContextMenu(e);
      }

      function disableContextMenuListener() {
        document.removeEventListener("contextmenu", handleContextMenu, false);
      }

      function enableContextMenuListener() {
        document.addEventListener("contextmenu", handleContextMenu, false);
      }

      document.addEventListener("DOMContentLoaded", function () {
        enableContextMenuListener();

        document.addEventListener(
          "click",
          function (e) {
            const menu = document.getElementById("contextMenu");
            if (!menu.contains(e.target)) {
              hideContextMenu();
            }
          },
          false,
        );
      });

      function enableNormalContextMenu() {
        hideContextMenu();
        showContextMenu = function () {
          console.log("Custom context menu disabled!");
        };
      }

      function enableCustomContextMenu() {
        showContextMenu = function (e) {
          e.preventDefault();
          const menu = document.getElementById("contextMenu");
          menu.style.animation = "";
          menu.classList.remove("hidden");
          menu.style.position = "absolute";
          menu.style.left = `${e.pageX}px`;
          menu.style.top = `${e.pageY}px`;
        };
      }
    </script>
    <style>
      body {
        background-color: #165fc9;
      }
      .hidden {
        display: none;
      }

      #contextMenu {
        background-color: rgb(188, 188, 188);
        height: fit-content;
        width: fit-content;
        position: fixed;
        border-top: 1px solid white;
        border-left: 1px solid white;
        border-right: 2px solid black;
        border-bottom: 2px solid black;
      }

      @keyframes fadeOut {
        60% {
          opacity: 50%;
        }

        100% {
          opacity: 0%;
        }
      }

      .option {
        width: 100%;
        user-select: none;
        position: relative;
        border-bottom: 1px solid grey;
        border-top: 1px solid white;
      }

      .topOption {
        width: 100%;
        user-select: none;
        position: relative;
        border-bottom: 1px solid grey;
      }

      .bottomOption {
        width: 100%;
        user-select: none;
        position: relative;
        border-top: 1px solid white;
      }

      .option:hover,
      .topOption:hover,
      .bottomOption:hover {
        background-color: rgb(157, 157, 157);
      }
    </style>
  </head>

  <body>
    <button onclick="enableCustomContextMenu()">enable custom menu</button>
    <div id="contextMenu" class="hidden">
      <div onclick="enableNormalContextMenu()" class="topOption">
        &NonBreakingSpace;
        <span style="text-decoration: underline">D</span>isable this
        menu&ThickSpace;
      </div>
      <!-- <div onclick="enableNormalContextMenu()" class="option">
        &NonBreakingSpace; <span style="text-decoration: underline">C</span>lick
        Me!
      </div>
      <div onclick="enableNormalContextMenu()" class="bottomOption">
        &NonBreakingSpace; <span style="text-decoration: underline">C</span>lick
        Me!
      </div> -->
    </div>
  </body>
</html>
