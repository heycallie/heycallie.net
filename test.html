<!doctype html>
<html>
  <head>
    <style>
      details.music summary {
        cursor: pointer;
        list-style: none;
        position: relative;
        padding-left: 24px;
        user-select: none;
      }

      details.music summary::-webkit-details-marker {
        display: none;
      }

      details.music summary::before {
        content: "";
        position: absolute;
        left: 0;
        top: 1px;
        width: 16px;
        height: 16px;
        background-image: url("assets/Expand.png");
        background-size: contain;
        background-repeat: no-repeat;
      }

      details[open].music summary::before {
        background-image: url("assets/Collapse.png");
      }

      .musicRow {
        position: relative;
        left: 30px;
        cursor: default;
        padding-left: 6px;
        width: 82px;
        user-select: none;
      }

      .musicRow img {
        height: 15px;
        top: 3px;
        position: relative;
      }

      .musicRow p {
        margin: 0;
      }

      .musicRow:hover {
        background-color: rgb(202, 202, 202);
      }
    </style>
  </head>

  <body>
    <details class="music">
      <summary>
        <img
          src="assets/Folder Opened.png"
          style="height: 15px; top: 2px; position: relative"
        />Music
      </summary>

      <div id="Music">
        <div class="musicRow" onclick="">
          <p><img src="assets/Folder Opened.png" />TV Girl</p>
        </div>
        <div class="musicRow" onclick="">
          <p><img src="assets/Folder Opened.png" />femtanyl</p>
        </div>
        <div class="musicRow" onclick="">
          <p><img src="assets/Folder Opened.png" />Lovejoy</p>
        </div>
      </div>
    </details>
  </body>
</html>
