      var audio = new Audio(
        "assets/music/Intermission - Cavetown - Edited.mp3",
      );
      audio.pause();
      var audioIsPlaying = false;

      function toggleAudio() {
        if (audioIsPlaying === false) {
          audio.play();
          audioIsPlaying = true;
        } else if (audioIsPlaying === true) {
          audio.pause();
          audioIsPlaying = false;
        }
      }

      function getRandomInt(max) {
        return Math.floor(Math.random() * max);
      }

      window.addEventListener("DOMContentLoaded", function () {
        var numGen = getRandomInt(3);

        if (numGen === 0) {
          document.getElementById("video").src =
            "https://www.youtube.com/embed/HmkbBdD8044";
        } else if (numGen === 1) {

            "https://www.youtube.com/embed/bzWs0VpYftE";

    <style>
      html {

        border-left: 1px solid #d0daff;
        height: fit-content;
        background-color: white;

      .textboxtop {

        height: 10px;
        background-color: #2196f3;
        z-index: 2;
        border-top-left-radius: 6px;
