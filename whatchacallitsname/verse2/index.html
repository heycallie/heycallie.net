<!doctype html>
<html>
  <head>
    <title>Verse 2</title>
    <style>
      html {
        background-image: url("background.jpg");
        background-color: teal;
        font-family: "Times New Roman", Times, serif;
        font-size: 2.5vh;
      }

      .border {
        display: block;
        margin-left: auto;
        margin-right: auto;
        border-left: 1vh solid #b3b0b0;
        border-top: 1vh solid #b3b0b0;
        border-bottom: 1vh solid #474b4c;
        border-right: 1vh solid #474b4c;
        background-color: white;
        height: 12vh;
        width: 30vw;
        text-align: center;
        line-height: 9vh;
        margin-top: 35vh;
      }
      .border h1 {
        margin: 0px;
        color: #d0ccc7;
      }

      /* color for unsung text: #D0CCC7 */
      /* color for sung text: #35ceb9 */

      .inner-border {
        display: block;
        margin-left: auto;
        margin-right: auto;
        border-left: 0.5vh solid #585835;
        border-top: 0.5vh solid #585835;
        border-bottom: 0.5vh solid #c9ccab;
        border-right: 0.5vh solid #c9ccab;
        height: 9vh;
        width: 28vw;
        margin-top: 1vh;
      }

      div#leftfish div {
        height: 28vh;
        width: 21vw;
        background-image: url("fish-flip.gif");
        background-repeat: no-repeat;
        position: absolute;
        left: 0px;
      }

      div#rightfish div {
        height: 28vh;
        width: 21vw;
        background-image: url("fish.gif");
        background-repeat: no-repeat;
        position: absolute;
        right: 0px;
      }
    </style>
  </head>

  <body>
    <audio id="track" src="Verse2.mp3" autoplay></audio>

    <div id="leftfish">
      <div style="top: 0px"></div>
      <div style="top: calc(30vh)"></div>
      <div style="top: calc(60vh)"></div>
      <div style="top: calc(90vh)"></div>
      <div style="top: calc(120vh)"></div>
      <div style="top: calc(150vh)"></div>
      <div style="top: calc(180vh)"></div>
      <div style="top: calc(210vh)"></div>
      <div style="top: calc(240vh)"></div>
    </div>
    <div id="rightfish">
      <div style="top: 0px"></div>
      <div style="top: calc(30vh)"></div>
      <div style="top: calc(60vh)"></div>
      <div style="top: calc(90vh)"></div>
      <div style="top: calc(120vh)"></div>
      <div style="top: calc(150vh)"></div>
      <div style="top: calc(180vh)"></div>
      <div style="top: calc(210vh)"></div>
      <div style="top: calc(240vh)"></div>
    </div>

    <div class="border" style="margin-top: 45vh">
      <div class="inner-border">
        <h1>
          <span id="1">It's </span>
          <span id="2">awk</span><span id="3">ward </span>
          <span id="4">to </span>
          <span id="5">ad</span><span id="6">mit</span>
        </h1>
      </div>
    </div>

    <div class="border" style="width: 35vw">
      <div class="inner-border" style="width: 33vw">
        <h1>
          <span id="7">I </span>
          <span id="8">ne</span><span id="9">ver </span>
          <span id="10">asked </span>
          <span id="11">to </span>
          <span id="12">bor</span><span id="13">row </span>
          <span id="14">it</span>
        </h1>
      </div>
    </div>

    <div class="border">
      <div class="inner-border">
        <h1>
          <span id="15">So </span>
          <span id="16">I </span>
          <span id="17">didn't </span>
          <span id="18">say </span>
          <span id="19">a </span>
          <span id="20">thing</span>
        </h1>
      </div>
    </div>

    <div class="border" style="height: 21vh">
      <div class="inner-border" style="line-height: 9vh; height: 18vh">
        <h1>
          <span id="21">When </span>
          <span id="22">you </span>
          <span id="23">thought </span>
          <span id="24">you </span>
          <span id="25">dropped</span>
          <span id="26">it </span>
          <span id="27">in </span>
          <span id="28">the </span>
          <span id="29">lake</span>
        </h1>
      </div>
    </div>

    <div class="border">
      <div class="inner-border">
        <h1>
          <span id="30">I </span>
          <span id="31">meant </span>
          <span id="32">to </span>
          <span id="33">give </span>
          <span id="34">it </span>
          <span id="35">back</span>
        </h1>
      </div>
    </div>

    <!-- i guess it slipped my mind until today -->

    <script>
      window.scrollTo(0, 0);

      const audio = document.getElementById("track");

      // ===== PRO-LEVEL OFFSET (visual delay compensation) =====
      const OFFSET = 0.05; // 50ms

      function setColor(id) {
        document.getElementById(id).style.color = "#35ceb9";
      }

      function scroll(multiplier) {
        window.scrollBy({
          top: window.innerHeight * multiplier,
          left: 0,
          behavior: "smooth",
        });
      }

      // ===== TIMELINE (adjust using captured timestamps) =====
      const events = [
        { time: 0.239 + OFFSET, action: () => setColor("1") },
        { time: 0.341 + OFFSET, action: () => setColor("2") },
        { time: 0.593 + OFFSET, action: () => setColor("3") },
        { time: 0.845 + OFFSET, action: () => setColor("4") },
        { time: 0.969 + OFFSET, action: () => setColor("5") },
        { time: 1.38 + OFFSET, action: () => setColor("6") },
        { time: 1.925 + OFFSET, action: () => setColor("7") },

        // { time: 2.0 + OFFSET, action: () => scroll(0.45) },

        { time: 2.048 + OFFSET, action: () => setColor("8") },
        { time: 2.171 + OFFSET, action: () => setColor("9") },
        { time: 2.532 + OFFSET, action: () => setColor("10") },
        { time: 2.739 + OFFSET, action: () => setColor("11") },
        { time: 2.943 + OFFSET, action: () => setColor("12") },
        { time: 3.066 + OFFSET, action: () => setColor("13") },
        { time: 3.352 + OFFSET, action: () => setColor("14") },

        { time: 4.415 + OFFSET, action: () => setColor("15") },
        { time: 4.661 + OFFSET, action: () => setColor("16") },
        { time: 4.865 + OFFSET, action: () => setColor("17") },
        { time: 4.988 + OFFSET, action: () => setColor("18") },
        { time: 5.232 + OFFSET, action: () => setColor("19") },
        { time: 5.933 + OFFSET, action: () => setColor("20") },

        { time: 6.056 + OFFSET, action: () => setColor("21") },
        { time: 6.343 + OFFSET, action: () => setColor("22") },
        { time: 6.547 + OFFSET, action: () => setColor("23") },
        { time: 6.794 + OFFSET, action: () => setColor("24") },

        { time: 7.04 + OFFSET, action: () => setColor("25") },
        { time: 7.2 + OFFSET, action: () => setColor("26") },
        { time: 7.446 + OFFSET, action: () => setColor("27") },
        { time: 7.568 + OFFSET, action: () => setColor("28") },
        { time: 8.017 + OFFSET, action: () => setColor("29") },

        { time: 8.342 + OFFSET, action: () => setColor("30") },
        { time: 8.583 + OFFSET, action: () => setColor("31") },
        { time: 8.787 + OFFSET, action: () => setColor("32") },
        { time: 8.909 + OFFSET, action: () => setColor("33") },
        { time: 9.155 + OFFSET, action: () => setColor("34") },
        { time: 9.892 + OFFSET, action: () => setColor("35") },

        { time: 10.047 + OFFSET, action: () => setColor("36") },
        { time: 10.169 + OFFSET, action: () => setColor("37") },
        { time: 10.5 + OFFSET, action: () => setColor("38") },
        { time: 10.745 + OFFSET, action: () => setColor("39") },
        { time: 10.99 + OFFSET, action: () => setColor("40") },
        { time: 11.112 + OFFSET, action: () => setColor("41") },
        { time: 11.439 + OFFSET, action: () => setColor("42") },

        { time: 11.809 + OFFSET, action: () => scrollTo(0, 9999999) },
      ];

      let index = 0;

      function sync() {
        const t = audio.currentTime;

        while (index < events.length && t >= events[index].time) {
          events[index].action();
          index++;
        }

        requestAnimationFrame(sync);
      }

      // ===== SPACEBAR TIMESTAMP CAPTURE =====
      window.addEventListener("keydown", (e) => {
        if (e.code === "Space") {
          e.preventDefault();
          console.log("Timestamp:", audio.currentTime.toFixed(3));
        }
      });

      sync();
    </script>
  </body>
</html>
