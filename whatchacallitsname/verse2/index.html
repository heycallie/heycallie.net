<!doctype html>
<html>
  <head>
    <title>Verse 2</title>
    <style>
      html {
        background-image: url("background.jpg");
        background-color: teal;
        font-family: "Times New Roman", Times, serif;
        font-size: 2.5vh;
      }

      .border {
        display: block;
        margin-left: auto;
        margin-right: auto;
        border-left: 1vh solid #b3b0b0;
        border-top: 1vh solid #b3b0b0;
        border-bottom: 1vh solid #474b4c;
        border-right: 1vh solid #474b4c;
        background-color: white;
        height: 12vh;
        width: 30vw;
        text-align: center;
        line-height: 9vh;
        margin-top: 35vh;
      }
      .border h1 {
        margin: 0px;
        color: #d0ccc7;
      }

      /* color for unsung text: #D0CCC7 */
      /* color for sung text: #35ceb9 */

      .inner-border {
        display: block;
        margin-left: auto;
        margin-right: auto;
        border-left: 0.5vh solid #585835;
        border-top: 0.5vh solid #585835;
        border-bottom: 0.5vh solid #c9ccab;
        border-right: 0.5vh solid #c9ccab;
        height: 9vh;
        width: 28vw;
        margin-top: 1vh;
      }

      div#leftfish div {
        height: 28vh;
        width: 21vw;
        background-image: url("fish-flip.gif");
        background-repeat: no-repeat;
        position: absolute;
        left: 0px;
      }

      div#rightfish div {
        height: 28vh;
        width: 22vw;
        background-image: url("fish.gif");
        background-repeat: no-repeat;
        position: absolute;
        right: 0px;
      }
    </style>
  </head>

  <body>
    <audio id="track" src="Verse2.mp3" autoplay></audio>

    <div id="leftfish">
      <div style="top: 0px"></div>
      <div style="top: calc(30vh)"></div>
      <div style="top: calc(60vh)"></div>
      <div style="top: calc(90vh)"></div>
      <div style="top: calc(120vh)"></div>
      <div style="top: calc(150vh)"></div>
      <div style="top: calc(180vh)"></div>
      <div style="top: calc(210vh)"></div>
      <div style="top: calc(240vh)"></div>
      <div style="top: calc(270vh)"></div>
      <div style="top: calc(300vh)"></div>
      <div style="top: calc(330vh)"></div>
      <div style="top: calc(360vh)"></div>
    </div>
    <div id="rightfish">
      <div style="top: 0px"></div>
      <div style="top: calc(30vh)"></div>
      <div style="top: calc(60vh)"></div>
      <div style="top: calc(90vh)"></div>
      <div style="top: calc(120vh)"></div>
      <div style="top: calc(150vh)"></div>
      <div style="top: calc(180vh)"></div>
      <div style="top: calc(210vh)"></div>
      <div style="top: calc(240vh)"></div>
      <div style="top: calc(270vh)"></div>
      <div style="top: calc(300vh)"></div>
      <div style="top: calc(330vh)"></div>
      <div style="top: calc(360vh)"></div>
    </div>

    <div class="border" style="margin-top: 45vh; width: 34vw">
      <div class="inner-border" style="width: 31vw">
        <h1>
          <span id="1">It's </span>
          <span id="2">awk</span><span id="3">ward </span>
          <span id="4">to </span>
          <span id="5">ad</span><span id="6">mit</span>
        </h1>
      </div>
    </div>

    <div class="border" style="width: 39vw">
      <div class="inner-border" style="width: 36vw">
        <h1>
          <span id="7">I </span>
          <span id="8">ne</span><span id="9">ver </span>
          <span id="10">asked </span>
          <span id="11">to </span>
          <span id="12">bor</span><span id="13">row </span>
          <span id="14">it</span>
        </h1>
      </div>
    </div>

    <div class="border" style="width: 34vw">
      <div class="inner-border" style="width: 31vw">
        <h1>
          <span id="15">So </span>
          <span id="16">I </span>
          <span id="17">didn't </span>
          <span id="18">say </span>
          <span id="19">a </span>
          <span id="20">thing</span>
        </h1>
      </div>
    </div>

    <div class="border" style="height: 21vh; width: 35vw">
      <div
        class="inner-border"
        style="line-height: 9vh; height: 18vh; width: 32vw"
      >
        <h1>
          <span id="21">When </span>
          <span id="22">you </span>
          <span id="23">thought </span>
          <span id="24">you </span>
          <span id="25">dropped</span>
          <span id="26">it </span>
          <span id="27">in </span>
          <span id="28">the </span>
          <span id="29">lake</span>
        </h1>
      </div>
    </div>

    <div class="border" style="width: 34vw">
      <div class="inner-border" style="width: 31vw">
        <h1>
          <span id="30">I </span>
          <span id="31">meant </span>
          <span id="32">to </span>
          <span id="33">give </span>
          <span id="34">it </span>
          <span id="35">back</span>
        </h1>
      </div>
    </div>

    <div>
      <img
        src="teto-scratch.gif"
        style="position: relative; left: 34vw; height: 50vh; margin-top: 35vh"
      />
      <div class="border" style="width: 53vw; margin-top: 0vh">
        <div class="inner-border" style="width: 51vw">
          <h1>
            <span id="36">I </span>
            <span id="37">guess </span>
            <span id="38">it </span>
            <span id="39">slipped </span>
            <span id="40">my </span>
            <span id="41">mind </span>
            <span id="42">un</span><span id="43">til </span>
            <span id="44">to</span><span id="45">day </span>
          </h1>
        </div>
      </div>
    </div>
    <br style="margin-top: 15vh" />

    <script>
      window.scrollTo(0, 0);

      const audio = document.getElementById("track");

      const OFFSET = 0.0; // in ms

      function setColor(id) {
        document.getElementById(id).style.color = "#35ceb9";
      }

      function scroll(multiplier) {
        window.scrollBy({
          top: window.innerHeight * multiplier,
          left: 0,
          behavior: "smooth",
        });
      }

      function fin() {
        alert("finished, for now...");
        // window.location.replace("/whatchacallitsname/BASS");
        window.location.replace("/");
      }

      const events = [
        { time: 0 + OFFSET, action: () => scrollTo(0, 0) },

        { time: 0.239 + OFFSET, action: () => setColor("1") }, // It's
        { time: 0.341 + OFFSET, action: () => setColor("2") }, // awk
        { time: 0.593 + OFFSET, action: () => setColor("3") }, // ward
        { time: 0.845 + OFFSET, action: () => setColor("4") }, // to
        { time: 0.969 + OFFSET, action: () => setColor("5") }, // ad
        { time: 1.38 + OFFSET, action: () => setColor("6") }, // mit
        { time: 1.78 + OFFSET, action: () => scroll(0.5) },

        { time: 2.022 + OFFSET, action: () => setColor("7") }, // I
        { time: 2.148 + OFFSET, action: () => setColor("8") }, // ne
        { time: 2.276 + OFFSET, action: () => setColor("9") }, // ver
        { time: 2.413 + OFFSET, action: () => setColor("10") }, // asked
        { time: 2.712 + OFFSET, action: () => setColor("11") }, // to
        { time: 2.921 + OFFSET, action: () => setColor("12") }, // bor
        { time: 3.051 + OFFSET, action: () => setColor("13") }, // row
        { time: 3.346 + OFFSET, action: () => setColor("14") }, // it
        { time: 3.823 + OFFSET, action: () => scroll(0.5) },

        { time: 3.892 + OFFSET, action: () => setColor("15") }, // So
        { time: 4.071 + OFFSET, action: () => setColor("16") }, // I
        { time: 4.322 + OFFSET, action: () => setColor("17") }, // didn't
        { time: 4.752 + OFFSET, action: () => setColor("18") }, // say
        { time: 4.883 + OFFSET, action: () => setColor("19") }, // a
        { time: 5.235 + OFFSET, action: () => setColor("20") }, // thing
        { time: 5.715 + OFFSET, action: () => scroll(0.5) },

        { time: 5.934 + OFFSET, action: () => setColor("21") }, // When
        { time: 6.056 + OFFSET, action: () => setColor("22") }, // you
        { time: 6.343 + OFFSET, action: () => setColor("23") }, // thought
        { time: 6.547 + OFFSET, action: () => setColor("24") }, // you
        { time: 6.794 + OFFSET, action: () => setColor("25") }, // dropped
        { time: 7.04 + OFFSET, action: () => setColor("26") }, // it
        { time: 7.2 + OFFSET, action: () => setColor("27") }, // in
        { time: 7.446 + OFFSET, action: () => setColor("28") }, // the
        { time: 7.568 + OFFSET, action: () => setColor("29") }, // lake
        { time: 7.746 + OFFSET, action: () => scroll(0.5) },

        { time: 7.923 + OFFSET, action: () => setColor("30") }, // I
        { time: 8.306 + OFFSET, action: () => setColor("31") }, // meant
        { time: 8.514 + OFFSET, action: () => setColor("32") }, // to
        { time: 8.773 + OFFSET, action: () => setColor("33") }, // give
        { time: 8.9 + OFFSET, action: () => setColor("34") }, // it
        { time: 9.156 + OFFSET, action: () => setColor("35") }, // back
        { time: 9.57 + OFFSET, action: () => scroll(1.5) },

        { time: 9.919 + OFFSET, action: () => setColor("36") }, // I
        { time: 10.048 + OFFSET, action: () => setColor("37") }, // guess
        { time: 10.174 + OFFSET, action: () => setColor("38") }, // it
        { time: 10.483 + OFFSET, action: () => setColor("39") }, // slipped
        { time: 10.74 + OFFSET, action: () => setColor("40") }, // my
        { time: 10.995 + OFFSET, action: () => setColor("41") }, // mind
        { time: 11.085 + OFFSET, action: () => setColor("42") }, // un
        { time: 11.118 + OFFSET, action: () => setColor("43") }, // til
        { time: 11.415 + OFFSET, action: () => setColor("44") }, // to
        { time: 11.578 + OFFSET, action: () => setColor("45") }, // day

        { time: 11.809 + OFFSET, action: () => scrollTo(0, 9999999) },

        {
          time: 15.569 + OFFSET,
          action: () => fin(),
        },
      ];

      let index = 0;

      function sync() {
        const t = audio.currentTime;

        while (index < events.length && t >= events[index].time) {
          events[index].action();
          index++;
        }

        requestAnimationFrame(sync);
      }

      // TIMESTAMP CAPTURE
      window.addEventListener("keydown", (e) => {
        if (e.code === "Space") {
          e.preventDefault();
          console.log("Timestamp:", audio.currentTime.toFixed(3));
        }
      });

      sync();
    </script>
  </body>
</html>
