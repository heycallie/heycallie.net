<!doctype html>
<html>
  <head>
    <title>Verse 2</title>
    <style>
      html {
        background-image: url("background.jpg");
        background-color: teal;
        font-family: "Times New Roman", Times, serif;
        font-size: 2.5vh;
      }

      .border {
        display: block;
        margin-left: auto;
        margin-right: auto;
        border-left: 1vh solid #b3b0b0;
        border-top: 1vh solid #b3b0b0;
        border-bottom: 1vh solid #474b4c;
        border-right: 1vh solid #474b4c;
        background-color: white;
        height: 12vh;
        width: 30vw;
        text-align: center;
        line-height: 9vh;
        margin-top: 35vh;
      }
      .border h1 {
        margin: 0px;
        color: #d0ccc7;
      }

      /* color for unsung text: #D0CCC7 */
      /* color for sung text: #35ceb9 */

      .inner-border {
        display: block;
        margin-left: auto;
        margin-right: auto;
        border-left: 0.5vh solid #585835;
        border-top: 0.5vh solid #585835;
        border-bottom: 0.5vh solid #c9ccab;
        border-right: 0.5vh solid #c9ccab;
        height: 9vh;
        width: 28vw;
        margin-top: 1vh;
      }

      div#leftfish div {
        height: 28vh;
        width: 21vw;
        background-image: url("fish-flip-up.gif");
        background-repeat: no-repeat;
        position: absolute;
        left: 0px;
      }

      div#rightfish div {
        height: 28vh;
        width: 22vw;
        background-image: url("fish-up.gif");
        background-repeat: no-repeat;
        position: absolute;
        right: 0px;
      }
    </style>
  </head>

  <body>
    <audio id="track" src="Verse2.mp3" autoplay></audio>

    <div id="leftfish">
      <div style="top: 0px"></div>
      <div style="top: calc(30vh)"></div>
      <div style="top: calc(60vh)"></div>
      <div style="top: calc(90vh)"></div>
    </div>
    <div id="rightfish">
      <div style="top: 0px"></div>
      <div style="top: calc(30vh)"></div>
      <div style="top: calc(60vh)"></div>
      <div style="top: calc(90vh)"></div>
    </div>

    <div class="border" style="margin-top: 45vh; width: 34vw">
      <div class="inner-border" style="width: 31vw">
        <h1>
          <span id="1">It's </span>
          <span id="2">awk</span><span id="3">ward </span>
          <span id="4">to </span>
          <span id="5">ad</span><span id="6">mit</span>
        </h1>
      </div>
    </div>

    <script>
      window.scrollTo(0, 0);

      const audio = document.getElementById("track");

      const OFFSET = 0.0; // in ms

      function setColor(id) {
        document.getElementById(id).style.color = "#35ceb9";
      }

      function scroll(multiplier) {
        window.scrollBy({
          top: window.innerHeight * multiplier,
          left: 0,
          behavior: "smooth",
        });
      }

      const events = [{ time: 0 + OFFSET, action: () => scrollTo(0, 0) }];

      let index = 0;

      function sync() {
        const t = audio.currentTime;

        while (index < events.length && t >= events[index].time) {
          events[index].action();
          index++;
        }

        requestAnimationFrame(sync);
      }

      // TIMESTAMP CAPTURE
      window.addEventListener("keydown", (e) => {
        if (e.code === "Space") {
          e.preventDefault();
          console.log("Timestamp:", audio.currentTime.toFixed(3));
        }
      });

      sync();
    </script>
  </body>
</html>
