name: Update Badges

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badges:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Count lines of code
        id: loc
        run: |
          TOTAL=$(find . \
            -type f \
            \( \
              -name "*.html" -o \
              -name "*.css" -o \
              -name "*.js" \
            \) \
            -not -path "./node_modules/*" \
            -not -path "./.git/*" \
            | xargs cat | wc -l)

          echo "total=$TOTAL" >> $GITHUB_OUTPUT

      - name: Generate badge JSON
        run: |
          mkdir -p badges

          cat > badges/stats.json << EOF
          {
            "schemaVersion": 1,
            "label": "lines",
            "message": "${{ steps.loc.outputs.total }}",
            "color": "blue"
          }
          EOF

      - name: Commit badge data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add badges/stats.json

          git diff --staged --quiet || git commit -m "Update LOC badge"

          git push
