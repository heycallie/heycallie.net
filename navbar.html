<!doctype html>
<html lang="en">
  <head>
    <script src="script.js" async></script>
    <link rel="stylesheet" href="navstyle.css" />
    <link rel="stylesheet" href="popupstyle.css" />
    <title>Navigation Bar Test</title>
    <link
      rel="icon"
      href="https://cdn-icons-png.flaticon.com/512/25/25231.png"
    />
  </head>
  <body>
    <div id="navBar">
      <div id="fileButton" class="navButton">
        <p><u>F</u>ile</p>
      </div>
      <div id="fileDropdown" class="hidden navDropdown">
        <div
          onclick="
            newTab();
            checkFileDropdown();
          "
          id="selection"
        >
          <u>N</u>ew Tab
        </div>

        <div
          onclick="
            newWindow();
            checkFileDropdown();
          "
          id="selection"
        >
          New <u>W</u>indow
        </div>
        <hr />
        <div
          onclick="
            redirect();
            checkFileDropdown();
          "
          id="selection"
        >
          <u>O</u>pen in New Tab
        </div>

        <div
          onclick="
            closeTab();
            checkFileDropdown();
          "
          id="selection"
        >
          <u>C</u>lose
        </div>
      </div>

      <div id="editButton" class="navButton">
        <p><u>E</u>dit</p>
      </div>
      <div id="editDropdown" class="hidden navDropdown">
        <div id="selection">Hello World!</div>
      </div>

      <div id="viewButton" class="navButton">
        <p><u>V</u>iew</p>
      </div>
    </div>
  </body>
</html>
